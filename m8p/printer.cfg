# https://docs.kalico.gg/Config_Reference.html#bed_mesh
# Copied from Sovol config as is.
# TODO: revisit for INDX!
[bed_mesh]
speed: 400
horizontal_move_z: 1.5
algorithm: bicubic
mesh_min: 13,15              
mesh_max: 476,490
probe_count: 60,60
fade_start: 0
fade_end: 10
scan_overshoot: 4

# https://docs.kalico.gg/Config_Reference.html#bed_screws
# TODO: look to adapt https://github.com/Schmudus/SV08max/blob/main/printer_data/config/bed_screws.cfg
# [bed_screws]

# https://docs.kalico.gg/Config_Reference.html#quad_gantry_level
# Copied from Sovol config as is.
# TODO, cross check
[quad_gantry_level]
gantry_corners:
	-70,-40
	550,600
points:
    40, 40
    40, 470
    490, 470
    490, 42
speed: 300
horizontal_move_z: 10 #2.0
retry_tolerance: 0.075
retries: 15

