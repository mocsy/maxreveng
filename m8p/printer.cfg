#[include custom.cfg]

[gcode_arcs]
resolution: 0.1

[virtual_sdcard]
path: /home/pi/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

[idle_timeout]
gcode: _IDLE_TIMEOUT
timeout: 1800

[save_variables]
filename: /home/pi/printer_data/config/saved_variables.cfg

[printer]
kinematics: corexy
max_velocity: 700
max_accel: 40000
minimum_cruise_ratio: 0.25
max_z_velocity: 10
max_z_accel: 500
square_corner_velocity: 5.0

# Motor1
[stepper_x]
step_pin: PE6
dir_pin: PE5
enable_pin: !PC14
# endstop_pin: ^PF4??
microsteps: 16
rotation_distance: 40
full_steps_per_rotation: 200
position_min: -11              
position_endstop: -11
position_max: 502
homing_speed: 120
homing_retract_dist: 3
homing_retract_speed: 15.0

# Motor2
[stepper_y]
step_pin: PE2
dir_pin: PE1
enable_pin: !PE4
# endstop_pin: ^PF3??
microsteps: 16
rotation_distance: 40
full_steps_per_rotation: 200
position_min: -1
position_endstop: 505
position_max: 505
homing_speed: 120
homing_retract_dist: 3
homing_retract_speed: 15.0

# Motor3
# [stepper_x1]
# step_pin: PB8
# dir_pin: !PB7
# enable_pin: !PE0
# endstop_pin: ^PF2??
# microsteps: 16
# rotation_distance: 40
# full_steps_per_rotation: 200

