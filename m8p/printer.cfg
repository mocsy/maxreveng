# Motor5
[stepper_z]
step_pin: PG13
dir_pin: PG12
enable_pin: !PG15
# endstop_pin: PF0??
microsteps: 16
rotation_distance: 40
gear_ratio: 80:12
position_max: 505
position_min: -10
homing_speed: 10.0
homing_retract_dist: 5.0
homing_retract_speed: 10.0
second_homing_speed: 5.0

# Motor6
[stepper_z1]
step_pin: PG9
dir_pin: PD7
enable_pin: !PG11
# endstop_pin: PC15??
microsteps: 16
rotation_distance: 40
gear_ratio: 80:12

# Motor7
[stepper_z2]
step_pin: PD4
dir_pin: PD3
enable_pin: !PD6
# endstop_pin:
microsteps: 16
rotation_distance: 40
gear_ratio: 80:12

# Motor8
[stepper_z3]
step_pin: PC7
dir_pin: PC8
enable_pin: !PD2
# endstop_pin:
microsteps: 16
rotation_distance: 40
gear_ratio: 80:12

[thermistor bed_thermistor]
temperature1: 25
resistance1: 100000
temperature2: 50
resistance2: 18085.4
temperature3: 100
resistance3: 5362.6

[heater_bed]
heater_pin: PF8 # Fan3
sensor_type: bed_thermistor
sensor_pin: PB1 # TB
max_power: 1.0
min_temp: -0
max_temp: 110
control : pid
pid_kp : 73.571
pid_ki : 1.820
pid_kd : 783.849

[verify_heater heater_bed]
max_error: 120
check_gain_time: 90
hysteresis: 10
heating_gain: 1

